<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Tables Practice</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>5 Day Forcast</h1>
    <!-- Recreate the table in the assignment.
    The table and caption tags are already Here.
    You will need to add the table headers and rows
    and data.  Hint: to get a degree symbol use &deg;
    -->
    <table>
    <caption>
        <strong>5 Day Forcast</strong><br>
        Your School Name Here
    </caption>
    <thead>
        <tr>
            <th>Day</th>
            <th>Description</th>
            <th>High/Low</th>
            <th>Precip</th>
            <th>Humidity</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Wed</td>
            <td>Sunny</td>
            <td>87°/61°</td>
            <td>0%</td>
            <td>23%</td>
        </tr>
        <tr>
            <td>Thu</td>
            <td>Mostly Sunny</td>
            <td>82°/48°</td>
            <td>10%</td>
            <td>34%</td>
        </tr>
        <tr>
            <td>Fri</td>
            <td>Mostly Sunny</td>
            <td>66°/46°</td>
            <td>0%</td>
            <td>35%</td>
        </tr>
        <tr>
            <td>Sat</td>
            <td>Partly Cloudy</td>
            <td>66°/47°</td>
            <td>20%</td>
            <td>40%</td>
        </tr>
        <tr>
            <td>Sun</td>
            <td>Sunny</td>
            <td>75°/53°</td>
            <td>10%</td>
            <td>38%</td>
        </tr>
    </tbody>
</table>
    <table>
      <caption>
        Sunset Jr High
      </caption>
    </table>
  </body>
</html>
